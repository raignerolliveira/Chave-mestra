<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cofre de Processos - Chave Mestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">CHAVE MESTRA | COFRE</a>
      <div class="d-flex align-items-center">
        <span id="userInfo" class="text-light me-3 small"></span>
        <button id="btnLogout" class="btn btn-outline-light btn-sm">Encerrar Sessão</button>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row mb-4">
      <div class="col">
        <div class="alert alert-info d-flex justify-content-between align-items-center">
          <span>Sessão Protegida: O acesso será revogado automaticamente após <strong>5 minutos</strong> de inatividade.</span>
          <span id="sessionTimer" class="badge bg-secondary">05:00</span>
        </div>
      </div>
    </div>

    <h3 class="mb-4">Processos Confidenciais Protegidos</h3>
    <div class="row" id="vaultContainer">
      <!-- Conteúdo inserido dinamicamente via JS -->
    </div>
  </div>

  <script>
    let idleTimer;
    let secondsLeft = 300;

    function startTimer() {
      const timerElement = document.getElementById('sessionTimer');
      setInterval(() => {
        if (secondsLeft <= 0) {
          window.location.href = '/index.html?reason=expired';
        } else {
          secondsLeft--;
          const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
          const s = String(secondsLeft % 60).padStart(2, '0');
          timerElement.textContent = `${m}:${s}`;
        }
      }, 1000);
    }

    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard/data', {
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });

        if (!res.ok) {
          window.location.href = '/index.html';
          return;
        }

        const data = await res.json();
        document.getElementById('userInfo').textContent = `${data.user.name} (${data.user.email})`;

        const container = document.getElementById('vaultContainer');
        container.innerHTML = '';

        data.vaultItems.forEach(item => {
          container.innerHTML += `
            <div class="col-md-6 mb-3">
              <div class="card card-custom vault-card p-3">
                <div class="card-body">
                  <span class="badge bg-danger mb-2">Confidencialidade: ${item.level}</span>
                  <h5 class="card-title">Processo: ${item.processNumber}</h5>
                  <h6 class="card-subtitle mb-3 text-muted">Cliente: ${item.client}</h6>
                  <p class="card-text bg-light p-3 rounded border font-monospace text-dark">${item.secretData}</p>
                </div>
              </div>
            </div>
          `;
        });

        startTimer();
      } catch (e) {
        window.location.href = '/index.html';
      }
    }

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await fetch('/api/logout', { 
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      });
      window.location.href = '/index.html';
    });

    // Zera o cronômetro visual em ações do usuário
    ['click', 'mousemove', 'keypress'].forEach(evt => {
      document.addEventListener(evt, () => { secondsLeft = 300; });
    });

    loadDashboard();
  </script>
</body>
</html>
