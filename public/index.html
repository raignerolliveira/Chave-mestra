<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Chave Mestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
  <script src="https://cdn.jsdelivr.net/npm/@simplewebauthn/browser@10.0.0/dist/bundle/index.umd.min.js"></script>
</head>
<body class="d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card card-custom p-4 p-md-5">
          <div class="text-center brand-header pb-3">
            <h2 class="fw-bold text-dark">Chave Mestra</h2>
            <p class="text-muted small">Autenticação Nativa por Bloqueio de Tela</p>
          </div>

          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="loginForm">
            <div class="mb-4">
              <label for="email" class="form-label">E-mail Cadastrado</label>
              <input type="email" class="form-control" id="email" required autocomplete="username">
            </div>

            <button type="submit" id="btnLogin" class="btn btn-primary-custom w-100">
              Autenticar com Biometria / PIN
            </button>
          </form>

          <div class="text-center mt-4">
            <a href="/register.html" class="text-decoration-none text-muted small">Cadastrar Novo Advogado</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
